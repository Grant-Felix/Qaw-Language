name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 编译
        run: cargo build --release

      - name: 单元测试
        run: cargo test

      - name: Clippy lint（-D warnings）
        run: cargo clippy --all-targets -- -D warnings

      - name: 端到端：6 个示例
        run: |
          set -e
          for f in examples/*.qaw; do
              echo "==> $f"
              ./target/release/qawc run "$f" > /tmp/out.txt
              # 验证非空输出（每个示例都应该打印东西）
              if [ ! -s /tmp/out.txt ]; then
                  echo "FAIL: $f produced empty output"
                  exit 1
              fi
          done
          echo "==> 所有 6 个示例通过"

  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 1.75
        uses: dtolnay/rust-toolchain@1.75
      - name: 编译 MSRV
        run: cargo build --release